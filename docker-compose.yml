version: '3.8'

services:
  mongodb:
    image: mongo:7-alpine
    container_name: goodnews-mongo
    ports: ["27017:27017"]
    volumes: [mongo-/data/db]
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goodnews-redis
    ports: ["6379:6379"]
    volumes: [redis-/data]
    command: redis-server --appendonly yes

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: goodnews-server
    ports: ["4000:4000"]
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/goodnews
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: goodnews-client
    ports: ["80:80"]
    depends_on: [server]
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data: